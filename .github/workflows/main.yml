name: API Automation CI

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Grant Permission
    run: chmod +x gradlew

  - name: Run Tests
    run: ./gradlew clean test

  - name: Check Report Folder
    run: ls -R app/build/

  - name: Upload HTML Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: html-report
      path: app/build/reports/tests/test/

  - name: Upload XML Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: junit-report
      path: app/build/test-results/test/
```
