name: API Automation CI

on:
push:
branches: [ "main" ]

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      distribution: 'temurin'
      java-version: '17'

  - name: Permission
    run: chmod +x gradlew

  - name: Run Test
    run: ./gradlew clean test

  - name: Debug Folder
    run: |
      echo "CHECK BUILD FOLDER"
      ls -R app/build || true

  - name: Upload Report HTML
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: html-report
      path: app/build/reports/tests/test

  - name: Upload Report XML
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: xml-report
      path: app/build/test-results/test


  - name: Upload HTML Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
    name: html-report
    path: app/build/reports/tests/test/

  - name: Upload XML Report
    if: always()
    uses: actions/upload-artifact@v4
    with:
    name: xml-report
    path: app/build/test-results/test/
